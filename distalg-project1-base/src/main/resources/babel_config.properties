#### Membership
#address=127.0.0.1
protocol.membership.samplesize=6
protocol.membership.sampletime=2000
protocol_metrics_interval=-1
channel_metrics_interval=-1

# Cyclon
protocol.membership.cyclon.maxN=6
protocol.membership.cyclon.shuffle_time=3000
protocol.membership.cyclon.subset_size=3

# HyParView
protocol.membership.hyparview.active_size=4
protocol.membership.hyparview.passive_size=8
protocol.membership.hyparview.arwl=4
protocol.membership.hyparview.prwl=2

protocol.membership.hyparview.shuffle_ttl=2
protocol.membership.hyparview.shuffle_period=5000
protocol.membership.hyparview.shuffle_k_active=2
protocol.membership.hyparview.shuffle_k_passive=3

#### Dissemination

#### App
app.payload.size 20
app.broadcast.period 3000
app.op.folder /home/distalg06/operations
app.op.start.file go.flag
app.of.fail.file fail.flag
app.op.file.pool 1000

#### Broadcast

# EagerPush
protocol.broadcast.eagerpush.fanout=2

# Hybrid
protocol.broadcast.hybrid.eager_fanout=3
protocol.broadcast.hybrid.lazy_fanout=1
protocol.broadcast.hybrid.min_eager_fanout=1
protocol.broadcast.hybrid.max_eager_fanout=4
protocol.broadcast.hybrid.adapt_window=12